name: CI

on:
  pull_request:
    branches: [main, beta, staging]
  push:
    branches: [main, beta, staging]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.19
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.19
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20.19, 22]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm test
        env:
          AGENTIC_SETUP_SKIP_UPDATE_CHECK: "1"
          AGENTIC_SETUP_TELEMETRY_DISABLED: "1"

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.19
          cache: npm

      - run: npm ci
      - run: npm run build
      - name: Smoke test
        run: node dist/bin.js --version
        env:
          AGENTIC_SETUP_SKIP_UPDATE_CHECK: "1"

  security-audit:
    name: security-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.19
          cache: npm

      - run: npm ci
      - run: npm audit --audit-level=high
