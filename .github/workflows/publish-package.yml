name: Publish Package

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (release, alpha, beta, rc)'
        required: true
        default: 'alpha'
        type: choice
        options:
          - release
          - alpha
          - beta
          - rc
      version_bump:
        description: 'Semver bump (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      build_type:
        description: 'Validation before publish (prod, beta, stage)'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - beta
          - stage
      branch:
        description: 'Branch to release from'
        required: true
        default: 'main'
        type: string

env:
  NODE_VERSION: '20'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # PAT from repo secret RELEASE_TOKEN; falls back to the workflow GITHUB_TOKEN.
      RELEASE_GIT_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://npm.pkg.github.com
          scope: '@arpit-pm1'
          cache: npm

      - run: npm ci

      - name: Validate (prod)
        if: inputs.build_type == 'prod'
        run: |
          npm run lint
          npx tsc --noEmit
          npm test

      - name: Validate (beta)
        if: inputs.build_type == 'beta'
        run: npm test

      - name: Validate (stage)
        if: inputs.build_type == 'stage'
        run: npm run build

      - name: Build
        if: inputs.build_type != 'stage'
        run: npm run build

      - name: Smoke test
        run: |
          node dist/bin.js --version
          node dist/bin.js --help
        env:
          AGENTIC_SETUP_SKIP_UPDATE_CHECK: '1'

      - name: Configure git credentials
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_GIT_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Bump version (release-it)
        id: version
        env:
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: github-actions@github.com
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com
          GITHUB_TOKEN: ${{ env.RELEASE_GIT_TOKEN }}
        run: |
          npm run version-bump:${{ inputs.version_bump }}:${{ inputs.release_type }}
          echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Rebuild at release version
        run: npm run build

      - name: Publish to GitHub Packages
        run: npm run publish:${{ inputs.release_type }}
        env:
          NODE_AUTH_TOKEN: ${{ env.RELEASE_GIT_TOKEN }}

      - name: Push floating major tag
        if: inputs.release_type == 'release'
        run: |
          git remote set-url origin "https://x-access-token:${RELEASE_GIT_TOKEN}@github.com/${{ github.repository }}.git"
          MAJOR=$(echo "${{ steps.version.outputs.version }}" | cut -d. -f1)
          git tag -f "v${MAJOR}"
          git push -f origin "v${MAJOR}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ env.RELEASE_GIT_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          if [ "${{ inputs.release_type }}" = "release" ]; then
            if [ -f CHANGELOG.md ]; then
              gh release create "${TAG}" \
                --title "${TAG}" \
                --notes-file CHANGELOG.md \
                --latest
            else
              gh release create "${TAG}" \
                --title "${TAG}" \
                --generate-notes \
                --latest
            fi
          else
            gh release create "${TAG}" \
              --title "${TAG} (${{ inputs.release_type }})" \
              --generate-notes \
              --prerelease
          fi

      - name: Output package details
        run: cat package.json
