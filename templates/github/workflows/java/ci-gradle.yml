name: Java CI (Gradle)

on:
  push:
    branches: [ main, beta, staging ]
  pull_request:
    branches: [ main, beta, staging ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK {{JAVA_VERSION}}
      uses: actions/setup-java@v4
      with:
        java-version: '{{JAVA_VERSION}}'
        distribution: '{{JDK_DISTRIBUTION}}'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
        
    - name: Check Formatting (Spotless)
      run: ./gradlew spotlessCheck

    - name: Run Static Analysis (SpotBugs)
      run: ./gradlew spotbugsMain spotbugsTest

    - name: Run Tests (JUnit) and generate Code Coverage (JaCoCo)
      run: ./gradlew test jacocoTestReport

    - name: Upload JaCoCo Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: build/reports/jacoco/test/html/
